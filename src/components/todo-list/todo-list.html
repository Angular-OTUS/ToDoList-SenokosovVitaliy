<div class="todo-layout">
  <div class="todo-list-container">
    @if (isLoading()) {
    <div class="loading">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
    } @else {
    <ul class="todo-list">
      @for (task of tasks(); track task.id) {
      <app-todo-item
        [task]="task"
        [isEditing]="editingTaskId() === task.id"
        (deleteItem)="deleteTask(task)"
        (selectItem)="selectTask(task)"
        (startEdit)="startEditTask(task)"
        (editItem)="updateTask(task, $event)"
        (cancelEdit)="cancelEditTask()"
      />
      }
    </ul>

    <div class="add-task-form">
      <input
        class="task-input"
        #taskInput
        type="text"
        (keyup.enter)="addTask(taskInput.value, descriptionInput.value); taskInput.value=''; descriptionInput.value=''; textChanged('')"
        (keyup)="textChanged(taskInput.value)"
        placeholder="Task name"
      />

      <textarea
        class="task-input task-textarea"
        #descriptionInput
        placeholder="Task description"
      ></textarea>

      <app-button
        hintText="Click to add a new task"
        (clicked)="addTask(taskInput.value, descriptionInput.value); taskInput.value=''; descriptionInput.value=''; textChanged('')"
        [isDisabled]="isTextEmpty()"
        className="button button--add"
      >add</app-button>
    </div>
    }
  </div>

  <div class="description-panel">
    <h3 class="description-panel__title">Task Description</h3>
    @if (selectedItemId()) {
    <p class="description-panel__text">{{ descriptionOutputText() }}</p>
    } @else {
    <p class="description-panel__placeholder">Select a task to see its description</p>
    }
  </div>
</div>
